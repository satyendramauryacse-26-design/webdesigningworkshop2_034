<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Employee Management System | JS Lab</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-dark text-light">

<div class="container py-4">

<!-- Header -->

<div class="text-center mb-4">
<h1 class="fw-bold">👔 Employee Management System</h1>
<p class="text-secondary">JavaScript Arrays & Objects - Lab Experiment 5</p>
</div>

<!-- Add Employee Card -->

<div class="card bg-secondary bg-opacity-10 border-light mb-4">

<div class="card-body">

<h5 class="card-title">➕ Add New Employee</h5>

<div class="row g-3">

<div class="col-md-6">
<label class="form-label">Employee Name</label>
<input type="text" id="empName" class="form-control" placeholder="Rahul Sharma">
</div>

<div class="col-md-6">
<label class="form-label">Employee ID</label>
<input type="number" id="empId" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Salary</label>
<input type="number" id="empSalary" class="form-control">
</div>

<div class="col-md-6">
<label class="form-label">Department</label>
<input type="text" id="empDept" class="form-control">
</div>

</div>

<button class="btn btn-primary mt-3 w-100" onclick="addEmployee()">
Add Employee
</button>

<div id="addMessage" class="mt-3"></div>

</div>
</div>

<!-- Operations -->

<div class="card bg-secondary bg-opacity-10 border-light mb-4">

<div class="card-body">

<h5 class="card-title">⚙️ Operations</h5>

<div class="row g-2">

<div class="col-md-6">
<button class="btn btn-primary w-100" onclick="displayAllEmployees()">Display All Employees</button>
</div>

<div class="col-md-6">
<button class="btn btn-success w-100" onclick="filterHighSalary()">Filter Salary > ₹50,000</button>
</div>

<div class="col-md-6">
<button class="btn btn-warning w-100" onclick="calculateTotalSalary()">Total Salary</button>
</div>

<div class="col-md-6">
<button class="btn btn-info w-100" onclick="calculateAverageSalary()">Average Salary</button>
</div>

</div>

<div class="input-group mt-3">

<input type="text" id="deptInput" class="form-control" placeholder="Department">

<button class="btn btn-dark" onclick="countByDepartment()">
Count Department
</button>

</div>

</div>
</div>

<!-- Results -->

<div class="card bg-secondary bg-opacity-10 border-light">

<div class="card-body">

<div id="resultArea"></div>

</div>
</div>

</div>

<script src="script.js"></script>

</body>
</html>
